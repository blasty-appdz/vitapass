name: VitaPass Agent — Prospection + Relances

on:
  schedule:
    - cron: '0 8 * * *'   # une fois par jour à 8h UTC
  workflow_dispatch:        # déclenchement manuel depuis GitHub

jobs:
  run:
    name: Prospection + Relances
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run agent
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          GOOGLE_PLACES_API_KEY:     ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_SEARCH_API_KEY:     ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX:          ${{ secrets.GOOGLE_SEARCH_CX }}
        run: node scripts/run-agent.mjs
