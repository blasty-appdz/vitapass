name: Test Email J+0

on:
  workflow_dispatch:

jobs:
  send:
    name: Envoyer email test J+0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Envoyer email test
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/test-email.mjs
